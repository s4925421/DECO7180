<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8faf7" />
    <title>ParkQuest - Live Activity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-parkquest-nav="activity">
    <div id="activity-toast" class="map-toast" role="status" aria-live="polite"></div>
    <div class="app app--scroll">
      <header class="app-header app-header--sub">
        <a href="index.html" class="icon-btn" aria-label="Back">
          <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        </a>
        <h1 class="app-header__title app-header__title--center">Live Activity</h1>
        <button type="button" class="icon-btn" aria-label="Location">
          <span class="material-symbols-outlined" aria-hidden="true">my_location</span>
        </button>
      </header>

      <main class="subpage-main">
        <section class="page-section activity-page__hero">
          <h2 class="section-title">Active parks now</h2>
          <p class="activity-page__sub">Live cards show social presence and safer, more familiar spaces.</p>
          <div id="activity-live-cards" class="activity-live-cards no-scrollbar" aria-live="polite"></div>
        </section>

        <section class="page-section activity-page__map-list" aria-labelledby="activity-list-title">
          <div class="section-title-row">
            <h2 id="activity-list-title" class="section-title">Events timeline</h2>
            <span id="activity-last-updated" class="leaderboard-section__hint">Updating...</span>
          </div>

          <div class="activity-mini-map-wrap">
            <div id="activity-mini-map" class="activity-mini-map" aria-label="Mini map for selected event"></div>
          </div>

          <div id="activity-event-list" class="activity-event-list" aria-live="polite"></div>
        </section>
      </main>

      <div id="parkquest-bottom-nav-root"></div>
    </div>

    <dialog id="activity-location-modal" class="activity-modal">
      <form method="dialog" class="activity-modal__form">
        <div class="activity-modal__head">
          <h3 id="activity-modal-title" class="activity-modal__title">Park location detail</h3>
          <button type="submit" class="icon-btn" aria-label="Close">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </div>
        <p id="activity-modal-body" class="activity-modal__body"></p>
      </form>
    </dialog>

    <script src="js/ui-loader.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/activity.js"></script>
    <script src="js/navagation.js"></script>
  </body>
</html>
