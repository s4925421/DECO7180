<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8faf7" />
    <title>Park Quest — Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* Map legend card (replaces trail-journey-card) */
      .map-legend-card {
        position: absolute;
        left: 0.85rem;
        right: 0.85rem;
        bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0) + 0.55rem);
        border-radius: var(--radius-2xl);
        background: color-mix(in srgb, var(--surface-container-lowest) 94%, transparent);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow-card);
        padding: 0.9rem 1.1rem 0.85rem;
        z-index: 10;
      }
      .map-legend-card__title {
        margin: 0 0 0.6rem;
        font-family: var(--font-display);
        font-size: 0.9375rem;
        font-weight: 800;
        color: var(--primary);
      }
      .map-filter-row {
        display: flex;
        gap: 0.4rem;
        overflow-x: auto;
        margin: 0 -1.1rem;
        padding: 0 1.1rem 0.1rem;
        scrollbar-width: none;
      }
      .map-filter-row::-webkit-scrollbar { display: none; }
      .map-filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.42rem 0.85rem;
        border-radius: var(--radius-pill);
        border: none;
        font-family: var(--font-display);
        font-size: 0.75rem;
        font-weight: 700;
        white-space: nowrap;
        flex-shrink: 0;
        background: var(--surface-container-high);
        color: var(--on-surface-variant);
        cursor: pointer;
        transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease;
      }
      .map-filter-chip:active { transform: scale(0.94); }
      .map-filter-chip.is-selected {
        background: var(--primary);
        color: var(--on-primary);
      }
      .map-legend-hint {
        margin: 0.55rem 0 0;
        font-size: 0.75rem;
        color: var(--on-surface-variant);
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }
      .map-legend-hint .material-symbols-outlined { font-size: 0.9rem; color: var(--primary); }

      /* Pulsing my-location dot */
      @keyframes loc-pulse {
        0%,100% { r: 8; opacity: 1; }
        50% { r: 13; opacity: 0.3; }
      }
      #my-location-ring { animation: loc-pulse 1.8s ease-in-out infinite; }
    </style>
  </head>

            <!-- ── My location dot (hidden until activated) ── -->

    <script>
    'use strict';

    /* ── Facility filter chips ── */
    const chips = document.querySelectorAll('.map-filter-chip');
    const groups = document.querySelectorAll('.facility-group');
    const routeLine = document.getElementById('trail-route-line');

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        const type = chip.dataset.filter;

        if (type === 'all') {
          chips.forEach(c => c.classList.remove('is-selected'));
          chip.classList.add('is-selected');
          groups.forEach(g => { g.style.display = ''; });
          if (routeLine) routeLine.style.display = '';
        } else {
          document.querySelector('[data-filter="all"]').classList.remove('is-selected');
          chip.classList.toggle('is-selected');

          const selected = [...document.querySelectorAll('.map-filter-chip.is-selected')]
            .map(c => c.dataset.filter);

          if (selected.length === 0) {
            document.querySelector('[data-filter="all"]').classList.add('is-selected');
            groups.forEach(g => { g.style.display = ''; });
            if (routeLine) routeLine.style.display = '';
          } else {
            groups.forEach(g => {
              g.style.display = selected.includes(g.dataset.type) ? '' : 'none';
            });
            if (routeLine) {
              routeLine.style.display = selected.includes('trail') ? '' : 'none';
            }
          }
        }
      });
    });

    /* ── My location simulation ── */
    const locGroup = document.getElementById('my-location-group');
    document.getElementById('btn-my-loc').addEventListener('click', () => {
      locGroup.style.display = locGroup.style.display === 'none' ? '' : 'none';
    });

    /* ── Zoom (SVG viewBox pan/zoom) ── */
    const svg = document.getElementById('park-map-svg');
    let vb = { x: 0, y: 0, w: 420, h: 620 };

    function applyVB() {
      svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
    }

    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      const cx = vb.x + vb.w / 2, cy = vb.y + vb.h / 2;
      vb.w = Math.max(160, vb.w * 0.78);
      vb.h = Math.max(235, vb.h * 0.78);
      vb.x = cx - vb.w / 2;
      vb.y = cy - vb.h / 2;
      applyVB();
    });

    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      const cx = vb.x + vb.w / 2, cy = vb.y + vb.h / 2;
      vb.w = Math.min(420, vb.w * 1.28);
      vb.h = Math.min(620, vb.h * 1.28);
      vb.x = Math.max(0, cx - vb.w / 2);
      vb.y = Math.max(0, cy - vb.h / 2);
      applyVB();
    });

    /* ── Touch pan ── */
    let isDragging = false, lastX = 0, lastY = 0;

    svg.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
      }
    }, { passive: true });

    svg.addEventListener('touchmove', e => {
      if (!isDragging || e.touches.length !== 1) return;
      const dx = (lastX - e.touches[0].clientX) * (vb.w / svg.clientWidth);
      const dy = (lastY - e.touches[0].clientY) * (vb.h / svg.clientHeight);
      vb.x = Math.max(0, Math.min(420 - vb.w, vb.x + dx));
      vb.y = Math.max(0, Math.min(620 - vb.h, vb.y + dy));
      applyVB();
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    }, { passive: true });

    svg.addEventListener('touchend', () => { isDragging = false; });
    </script>
