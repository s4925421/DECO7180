<section class="survey-container">
    <h2 class="survey-title">Share your park experience</h2>
    
    <div class="survey-group">
        <p class="question-text">1. How are the exercise facilities here (running paths/equipment)?</p>
        <div class="rating-row">
            <span class="label label--left">Not suitable</span>
            <div class="options-wrapper">
                <input type="radio" name="fitness" id="f1" class="btn--large"><label for="f1"></label>
                <input type="radio" name="fitness" id="f2" class="btn--small"><label for="f2"></label>
                <input type="radio" name="fitness" id="f3" class="btn--dot"><label for="f3"></label>
                <input type="radio" name="fitness" id="f4" class="btn--small"><label for="f4"></label>
                <input type="radio" name="fitness" id="f5" class="btn--large"><label for="f5"></label>
            </div>
            <span class="label label--center">Neutral</span>
            <span class="label label--right">Excellent</span>
        </div>
    </div>

    <div class="survey-group">
        <p class="question-text">2. How easy is it to find water, toilets, or seating?</p>
        <div class="rating-row">
            <span class="label label--left">Very hard</span>
            <div class="options-wrapper">
                <input type="radio" name="amenity" id="a1" class="btn--large"><label for="a1"></label>
                <input type="radio" name="amenity" id="a2" class="btn--small"><label for="a2"></label>
                <input type="radio" name="amenity" id="a3" class="btn--dot"><label for="a3"></label>
                <input type="radio" name="amenity" id="a4" class="btn--small"><label for="a4"></label>
                <input type="radio" name="amenity" id="a5" class="btn--large"><label for="a5"></label>
            </div>
            <span class="label label--center">Neutral</span>
            <span class="label label--right">Easy everywhere</span>
        </div>
    </div>
</section>
