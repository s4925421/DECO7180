<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8faf7" />
    <title>ParkQuest — Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-parkquest-nav="settings">
    <div class="app app--scroll">
      <header class="app-header app-header--sub">
        <a href="index.html" class="icon-btn" aria-label="Back">
          <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        </a>
        <h1 class="app-header__title app-header__title--center">Settings</h1>
        <span class="icon-btn" style="visibility: hidden" aria-hidden="true"></span>
      </header>

      <main class="subpage-main">
        <section class="page-section">
          <h2 class="section-title" style="margin-bottom: 1rem">Preferences</h2>
          <div class="settings-list">
            <button type="button" class="settings-row">
              <span>Notifications</span>
              <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
            </button>
            <button type="button" class="settings-row">
              <span>Units (metric)</span>
              <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
            </button>
            <button type="button" class="settings-row">
              <span>Accessibility</span>
              <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
            </button>
          </div>
        </section>

        <section class="page-section" style="background: var(--surface)">
          <h2 class="section-title" style="margin-bottom: 1rem">About</h2>
          <p class="page-subline" style="margin: 0">ParkQuest — explore Brisbane parks with confidence.</p>
          <p class="page-subline" style="margin: 0.75rem 0 0">Version 1.0</p>
        </section>
      </main>

      <div id="parkquest-bottom-nav-root"></div>
    </div>

    <script src="js/data-store.js"></script>
    <script src="js/ui-loader.js"></script>
    <script src="js/main.js"></script>
    <script src="js/navagation.js"></script>
  </body>
</html>
